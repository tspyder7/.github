name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: [ "enhancement" ]

body:
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: What do you want to add or improve?
      placeholder: Describe the feature clearly
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use case
      description: Why is this needed?
      placeholder: Explain the problem it solves
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: How could this be implemented?
      placeholder: Outline your idea
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: I checked for existing feature requests
          required: true
