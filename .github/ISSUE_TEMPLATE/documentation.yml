name: Documentation Update
description: Suggest improvements or report documentation issues
title: "[Docs]: "
labels: ["documentation"]

body:
  - type: input
    id: location
    attributes:
      label: Documentation Location
      placeholder: e.g. README.md, /docs/setup.md
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is the issue?
      description: Describe what’s wrong or missing
      placeholder: Be clear and specific
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: How should it be fixed?
      placeholder: Provide corrected text or idea
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: I checked existing docs and issues
          required: true
